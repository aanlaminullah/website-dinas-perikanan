<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Login Pages Preview</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Poppins:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            // Warna Diarpus
                            "lib-primary": "#1e40af",
                            "lib-secondary": "#3b82f6",
                            // Warna BKPSDM
                            "gov-red": "#991b1b",
                            "gov-dark": "#1f2937",
                            "gov-gold": "#fbbf24",
                        },
                        fontFamily: {
                            sans: ["Inter", "sans-serif"],
                            heading: ["Poppins", "sans-serif"],
                        },
                    },
                },
            };
        </script>
    </head>
    <body class="bg-gray-100">
        <div class="min-h-screen flex font-sans text-gray-800">
            <div
                class="hidden lg:flex w-1/2 relative bg-lib-primary overflow-hidden items-center justify-center"
            >
                <div class="absolute inset-0 z-0">
                    <img
                        src="https://images.unsplash.com/photo-1507842217343-583bb7270b66?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80"
                        class="w-full h-full object-cover opacity-30 mix-blend-overlay"
                    />
                </div>
                <div
                    class="absolute top-0 left-0 w-64 h-64 bg-white/10 rounded-full -translate-x-1/2 -translate-y-1/2 blur-3xl"
                ></div>
                <div
                    class="absolute bottom-0 right-0 w-96 h-96 bg-lib-secondary/20 rounded-full translate-x-1/3 translate-y-1/3 blur-3xl"
                ></div>

                <div class="relative z-10 text-center p-12 text-white max-w-lg">
                    <div
                        class="bg-white/10 backdrop-blur-sm p-4 rounded-2xl inline-block mb-6 shadow-lg border border-white/20"
                    >
                        <svg
                            class="w-12 h-12 text-white"
                            fill="none"
                            stroke="currentColor"
                            viewBox="0 0 24 24"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                stroke-width="2"
                                d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"
                            ></path>
                        </svg>
                    </div>
                    <h2 class="text-4xl font-bold mb-4 font-serif">
                        Literasi Digital
                    </h2>
                    <p class="text-blue-100 text-lg leading-relaxed">
                        "Perpustakaan adalah tempat di mana sejarah disimpan dan
                        masa depan ditulis. Masuk untuk menjelajah."
                    </p>
                </div>
            </div>

            <div
                class="w-full lg:w-1/2 bg-white flex items-center justify-center p-8"
            >
                <div class="w-full max-w-md space-y-8">
                    <div class="text-center lg:text-left">
                        <h2
                            class="text-3xl font-bold text-gray-900 tracking-tight"
                        >
                            Selamat Datang Kembali
                        </h2>
                        <p class="mt-2 text-sm text-gray-500">
                            Silakan masuk ke akun perpustakaan Anda.
                        </p>
                    </div>

                    <form class="mt-8 space-y-6" action="#" method="POST">
                        <div class="space-y-5">
                            <div>
                                <label
                                    for="email"
                                    class="block text-sm font-medium text-gray-700"
                                    >Email atau ID Anggota</label
                                >
                                <div class="mt-1 relative rounded-md shadow-sm">
                                    <div
                                        class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
                                    >
                                        <svg
                                            class="h-5 w-5 text-gray-400"
                                            fill="none"
                                            stroke="currentColor"
                                            viewBox="0 0 24 24"
                                        >
                                            <path
                                                stroke-linecap="round"
                                                stroke-linejoin="round"
                                                stroke-width="2"
                                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
                                            ></path>
                                        </svg>
                                    </div>
                                    <input
                                        type="text"
                                        name="email"
                                        id="email"
                                        class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-lib-secondary focus:border-transparent transition sm:text-sm"
                                        placeholder="contoh@email.com"
                                    />
                                </div>
                            </div>

                            <div>
                                <label
                                    for="password"
                                    class="block text-sm font-medium text-gray-700"
                                    >Kata Sandi</label
                                >
                                <div class="mt-1 relative rounded-md shadow-sm">
                                    <div
                                        class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
                                    >
                                        <svg
                                            class="h-5 w-5 text-gray-400"
                                            fill="none"
                                            stroke="currentColor"
                                            viewBox="0 0 24 24"
                                        >
                                            <path
                                                stroke-linecap="round"
                                                stroke-linejoin="round"
                                                stroke-width="2"
                                                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
                                            ></path>
                                        </svg>
                                    </div>
                                    <input
                                        type="password"
                                        name="password"
                                        id="password"
                                        class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-lib-secondary focus:border-transparent transition sm:text-sm"
                                        placeholder="••••••••"
                                    />
                                </div>
                                <div class="flex justify-end mt-1">
                                    <a
                                        href="#"
                                        class="font-medium text-sm text-lib-primary hover:text-lib-secondary"
                                        >Lupa kata sandi?</a
                                    >
                                </div>
                            </div>
                        </div>

                        <div>
                            <button
                                type="submit"
                                class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-gradient-to-r from-lib-primary to-lib-secondary hover:from-blue-800 hover:to-blue-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-lib-secondary shadow-lg shadow-blue-500/30 transition transform hover:-translate-y-0.5"
                            >
                                Masuk Sekarang
                            </button>
                        </div>
                    </form>

                    <div class="mt-6 text-center">
                        <p class="text-sm text-gray-500">
                            Belum menjadi anggota?
                            <a
                                href="#"
                                class="font-semibold text-lib-primary hover:text-lib-secondary"
                                >Daftar Online</a
                            >
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
